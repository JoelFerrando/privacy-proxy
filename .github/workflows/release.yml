name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: privacy-proxy-x86_64-unknown-linux-gnu.tar.gz
            binary: privacy-proxy
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: privacy-proxy-aarch64-apple-darwin.tar.gz
            binary: privacy-proxy
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: privacy-proxy-x86_64-pc-windows-msvc.zip
            binary: privacy-proxy.exe

    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release -p privacy-proxy --target ${{ matrix.target }}
      - name: Package Unix
        if: runner.os != 'Windows'
        run: |
          mkdir dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/
          cp README.md LICENSE-MIT LICENSE-APACHE dist/
          tar -czf "${{ matrix.archive }}" -C dist .
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/
          Copy-Item README.md,LICENSE-MIT,LICENSE-APACHE dist/
          Compress-Archive -Path dist/* -DestinationPath "${{ matrix.archive }}"
      - name: Upload artifact
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.archive }}

