name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Compile benchmarks
        run: cargo bench --no-run -p privacy_proxy_core --bench redaction

  audit:
    runs-on: ubuntu-latest
    env:
      CARGO_AUDIT_VERSION: 0.22.2
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo-audit binary
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-${{ env.CARGO_AUDIT_VERSION }}
      - name: Install cargo-audit
        run: |
          if [ ! -x "$HOME/.cargo/bin/cargo-audit" ]; then
            cargo install cargo-audit --locked --version "$CARGO_AUDIT_VERSION"
          fi
      - name: Audit Rust dependencies
        run: cargo audit --deny warnings
